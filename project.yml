name: MyScreen
options:
  bundleIdPrefix: com.myscreen
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.myscreen.app
    CODE_SIGN_ENTITLEMENTS: MyScreen/MyScreen.entitlements
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: QP5RAL5RB4
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: MyScreen/Info.plist
    SYMROOT: build

targets:
  MyScreen:
    type: application
    platform: macOS
    sources:
      - path: MyScreen
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: MyScreen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: IOKit.framework
